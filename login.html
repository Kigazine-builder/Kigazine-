<!DOCTYPE html>
<html>
<head>
  <title>Kigazine Login</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #020617;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Kigazine</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <!-- LOGIN BUTTON -->
    <button onclick="goHome()">Login</button>

    <!-- SIGNUP BUTTON -->
    <button onclick="goHome()">Sign Up</button>
  </div>

  <script>
    function goHome() {
      // Redirect to homepage
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
