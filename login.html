<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kigazine Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #0f172a;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  border: 1px solid #1e293b;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover { background: #2563eb; }

.switch {
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.7;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="title">Login</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="submit()">Login</button>

  <div class="switch" onclick="toggleMode()">
    Don't have an account? Sign up
  </div>
</div>

<script>
let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector("button").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector(".switch").innerText =
    isLogin ? "Don't have an account? Sign up" : "Already have an account? Login";
}

function submit() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) return alert("Fill everything");

  let users = JSON.parse(localStorage.getItem("users") || "{}");

  if (isLogin) {
    if (!users[username] || users[username] !== password) {
      return alert("Invalid login");
    }
  } else {
    if (users[username]) {
      return alert("User already exists");
    }
    users[username] = password;
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("user", username);
  window.location.href = "index.html";
}
</script>

</body>
</html>
