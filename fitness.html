<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kigazine Fun Fitness Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#dcfce7 2px, transparent 2px);
            background-size: 30px 30px;
        }
        .bounce-on-click:active {
            transform: scale(0.95);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-800">

    <div class="bg-white rounded-3xl shadow-xl max-w-md w-full overflow-hidden border-4 border-white">
        <div class="bg-indigo-500 p-6 text-center text-white relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-indigo-400 rounded-full opacity-50"></div>
            <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-indigo-600 rounded-full opacity-50"></div>
            <h1 class="text-3xl font-extrabold relative z-10 flex justify-center items-center gap-2">
                <span>👟</span> Kigazine Fit
            </h1>
            <p class="text-indigo-100 font-semibold relative z-10 mt-1">Get up and move!</p>
        </div>

        <div class="p-6">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3 px-1">Choose Activity</h2>
            <div class="flex overflow-x-auto gap-3 pb-2 hide-scrollbar px-1" id="exercise-buttons"></div>

            <div class="bg-indigo-50 border-2 border-indigo-100 rounded-2xl p-4 mt-4 flex items-center gap-4">
                <canvas id="coachCanvas" width="80" height="80" class="bg-white rounded-xl shadow-sm shrink-0 border border-slate-100"></canvas>
                <div>
                    <h3 class="font-bold text-indigo-800 text-sm">Coach's Tip:</h3>
                    <p id="demo-text" class="text-indigo-600 text-sm font-semibold">Feet together, jump wide, arms up!</p>
                </div>
            </div>

            <div class="relative w-full flex justify-center my-6">
                <canvas id="workoutCanvas" class="max-w-full drop-shadow-md rounded-2xl"></canvas>
            </div>

            <div class="flex flex-col gap-3">
                <button id="repBtn" onclick="addRep()" class="bounce-on-click w-full bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold text-xl py-4 rounded-2xl shadow-lg shadow-emerald-500/30 transition-all flex items-center justify-center gap-2">
                    <span>⭐</span> Count a Rep!
                </button>
                <button onclick="resetTracker()" class="bounce-on-click w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-lg py-3 rounded-2xl transition-all">
                    Reset Goal
                </button>
            </div>
        </div>
        
        <div class="bg-slate-50 p-4 text-center text-sm font-semibold text-slate-400 border-t border-slate-100">
            Play safe and drink plenty of water! 💧
        </div>
    </div>

    <script>
        const exercises = [
            { name: "Jumping Jacks", icon: "✨", color: "#6366f1", tip: "Feet together, jump wide, arms up!" },
            { name: "Squats", icon: "💪", color: "#f59e0b", tip: "Sit in an invisible chair, back straight!" },
            { name: "Frog Hops", icon: "🐸", color: "#10b981", tip: "Crouch low, spring up high like a frog!" },
            { name: "Arm Circles", icon: "⭕", color: "#ec4899", tip: "Arms out straight, draw tiny air circles." }
        ];

        let currentExerciseIndex = 0;
        let repCount = 0;
        const targetReps = 10;
        let targetProgress = 0;
        let currentProgress = 0;
        let pulseRadius = 0;
        let pulseOpacity = 1;

        const exerciseContainer = document.getElementById('exercise-buttons');
        
        function renderExerciseButtons() {
            exerciseContainer.innerHTML = '';
            exercises.forEach((ex, index) => {
                const isSelected = index === currentExerciseIndex;
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 px-4 py-2 rounded-full font-bold text-sm transition-all duration-200 border-2 ${
                    isSelected 
                    ? `bg-[${ex.color}] bg-opacity-10 border-[${ex.color}] text-[${ex.color}] scale-105` 
                    : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'
                }`;
                if (isSelected) {
                    btn.style.backgroundColor = `${ex.color}15`; 
                    btn.style.borderColor = ex.color;
                    btn.style.color = ex.color;
                }
                btn.innerHTML = `${ex.icon} ${ex.name}`;
                btn.onclick = () => setExercise(index);
                exerciseContainer.appendChild(btn);
            });
        }

        function setExercise(index) {
            currentExerciseIndex = index;
            repCount = 0;
            renderExerciseButtons();
            document.getElementById('demo-text').innerHTML = exercises[index].tip;
        }

        function addRep() {
            if (repCount < targetReps) {
                repCount++;
                const canvasEl = document.getElementById('workoutCanvas');
                canvasEl.style.transform = 'scale(1.05)';
                setTimeout(() => canvasEl.style.transform = 'scale(1)', 150);
            }
        }

        function resetTracker() {
            repCount = 0;
            pulseRadius = 0;
        }

        const mainCanvas = document.getElementById('workoutCanvas');
        const mainCtx = mainCanvas.getContext('2d');
        const mainCanvasSize = 300;
        const coachCanvas = document.getElementById('coachCanvas');
        const coachCtx = coachCanvas.getContext('2d');

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            mainCanvas.width = mainCanvasSize * dpr;
            mainCanvas.height = mainCanvasSize * dpr;
            mainCtx.scale(dpr, dpr);
            mainCanvas.style.width = mainCanvasSize + 'px';
            mainCanvas.style.height = mainCanvasSize + 'px';
        }
        setupCanvas();

        function drawCoach(time) {
            const ctx = coachCtx;
            ctx.clearRect(0, 0, 80, 80);
            ctx.strokeStyle = exercises[currentExerciseIndex].color; 
            ctx.fillStyle = exercises[currentExerciseIndex].color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            let headY = 20, shoulderY = 30, hipY = 50;
            let lFootX = 30, rFootX = 50, footY = 70;
            let lHandX = 20, rHandX = 60, handY = 45;
            let lKneeX = lFootX, rKneeX = rFootX, kneeY = 60;
            let useKnees = false;
            const cycle = Math.sin(time * 0.006);
            const p = (cycle + 1) / 2; 

            if (currentExerciseIndex === 0) {
                lFootX = 40 - (8 + p * 16);
                rFootX = 40 + (8 + p * 16);
                lHandX = 40 - (12 + p * 18);
                rHandX = 40 + (12 + p * 18);
                handY = 55 - p * 45;
                headY -= p * 4;
                shoulderY -= p * 4;
                hipY -= p * 4;
            } else if (currentExerciseIndex === 1) {
                useKnees = true;
                let squat = p * 14;
                headY += squat; shoulderY += squat; hipY += squat;
                lKneeX = 25; rKneeX = 55; kneeY = 50 + squat;
                lHandX = 25; rHandX = 55; handY = shoulderY + 5;
            } else if (currentExerciseIndex === 2) {
                useKnees = true;
                let jump = Math.max(0, Math.sin(time * 0.008)); 
                let crouch = Math.max(0, -Math.sin(time * 0.008));
                if (jump > 0) {
                    headY -= jump * 12; shoulderY -= jump * 12; hipY -= jump * 12; footY -= jump * 12;
                    lHandX = 25; rHandX = 55; handY = shoulderY - 5;
                    lKneeX = 35; rKneeX = 45; kneeY = hipY + 10;
                    lFootX = 35; rFootX = 45;
                } else {
                    headY += crouch * 16; shoulderY += crouch * 16; hipY += crouch * 16;
                    lHandX = 30; rHandX = 50; handY = footY;
                    lKneeX = 20; rKneeX = 60; kneeY = 65;
                }
            } else if (currentExerciseIndex === 3) {
                let angle = time * 0.008;
                let radius = 12;
                lHandX = 25 + Math.cos(angle) * radius;
                rHandX = 55 + Math.cos(-angle) * radius;
                handY = shoulderY + Math.sin(angle) * radius;
            }

            ctx.beginPath();
            ctx.arc(40, headY, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(40, headY + 6);
            ctx.lineTo(40, hipY);
            ctx.moveTo(40, shoulderY);
            ctx.lineTo(lHandX, handY);
            ctx.moveTo(40, shoulderY);
            ctx.lineTo(rHandX, handY);
            if (useKnees) {
                ctx.moveTo(40, hipY);
                ctx.lineTo(lKneeX, kneeY);
                ctx.lineTo(lFootX, footY);
                ctx.moveTo(40, hipY);
                ctx.lineTo(rKneeX, kneeY);
                ctx.lineTo(rFootX, footY);
            } else {
                ctx.moveTo(40, hipY);
                ctx.lineTo(lFootX, footY);
                ctx.moveTo(40, hipY);
                ctx.lineTo(rFootX, footY);
            }
            ctx.stroke();
        }

        function drawLoop(timestamp) {
            if (!timestamp) timestamp = 0;
            updateLogic();
            drawCanvas();
            drawCoach(timestamp);
            requestAnimationFrame(drawLoop);
        }

        function updateLogic() {
            targetProgress = Math.min(repCount / targetReps, 1);
            currentProgress += (targetProgress - currentProgress) * 0.15;
            if (repCount >= targetReps) {
                pulseRadius += 0.8;
                pulseOpacity -= 0.02;
                if (pulseOpacity <= 0) {
                    pulseRadius = 0;
                    pulseOpacity = 1;
                }
            } else {
                pulseRadius = 0;
                pulseOpacity = 1;
            }
        }

        function drawCanvas() {
            const currentEx = exercises[currentExerciseIndex];
            const centerX = mainCanvasSize / 2;
            const centerY = mainCanvasSize / 2;
            const radius = 100;
            const ctx = mainCtx;

            ctx.clearRect(0, 0, mainCanvasSize, mainCanvasSize);
            if (repCount >= targetReps) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 15 + pulseRadius, 0, 2 * Math.PI);
                ctx.lineWidth = 4;
                ctx.strokeStyle = `rgba(16, 185, 129, ${pulseOpacity})`; 
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.lineWidth = 20;
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineCap = 'round';
            ctx.stroke();

            if (currentProgress > 0) {
                const startAngle = -0.5 * Math.PI; 
                const endAngle = startAngle + (currentProgress * 2 * Math.PI);
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineWidth = 20;
                ctx.lineCap = 'round';
                ctx.strokeStyle = repCount >= targetReps ? '#10b981' : currentEx.color; 
                ctx.stroke();
            }
            ctx.font = '32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(currentEx.icon, centerX, centerY - 40);

            ctx.font = 'bold 56px Nunito, sans-serif';
            ctx.fillStyle = '#1e293b'; 
            ctx.fillText(repCount, centerX, centerY + 15);

            ctx.font = 'bold 16px Nunito, sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText(`/ ${targetReps} reps`, centerX, centerY + 50);

            if (repCount >= targetReps) {
                ctx.fillStyle = '#10b981'; 
                roundRect(ctx, centerX - 70, mainCanvasSize - 30, 140, 30, 15);
                ctx.font = 'bold 14px Nunito, sans-serif';
                ctx.fillStyle = 'white';
                ctx.fillText('Great Job! 🎉', centerX, mainCanvasSize - 15);
            }
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        setExercise(0);
        requestAnimationFrame(drawLoop); 
    </script>
</body>
</html>
